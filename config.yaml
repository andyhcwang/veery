# Veery configuration — all values are optional (defaults are sensible)
# Uncomment and modify as needed.

audio:
  input_gain: 5.0  # Max boost for quiet mics; auto-capped per chunk so loud mics never clip
#   sample_rate: 16000
#   chunk_duration_ms: 32  # Must be 32ms for Silero VAD (512 samples at 16kHz)
#   wait_timeout_sec: 30.0  # Timeout for wait-based recording flows
#   manual_max_duration_sec: null  # Optional cap for hold/toggle dictation

# vad:
#   threshold: 0.4
#   silence_duration_sec: 2.0

# stt:
#   backend: "whisper"            # "sensevoice" or "whisper"
#   model_name: "iic/SenseVoiceSmall"
#   language: "auto"

# jargon:
#   dict_paths:
#     - "jargon/quant_finance.yaml"
#     - "jargon/tech.yaml"
#     # Community jargon packs — uncomment the ones relevant to your work:
#     # - "jargon/community/ai_ml.yaml"        # AI/ML model names, concepts, tools
#     # - "jargon/community/devops_cloud.yaml"  # Kubernetes, AWS, CI/CD, observability
#     # - "jargon/community/frontend.yaml"      # Next.js, Tailwind, React ecosystem
#   fuzzy_threshold: 82

# hotkey:
#   key_combo: "right_cmd"
#   mode: "hold"                  # "hold" (push-to-talk) or "toggle" (press-to-toggle)

# output:
#   cgevent_char_limit: 150

streaming:
  enabled: true                   # Transcribe segments during pauses while you hold the key
#   finalize_pause_sec: 0.7       # Mid-clip pause that cuts a segment (recording still ends at vad.silence_duration_sec)
#   min_segment_sec: 1.0          # Don't cut segments with less speech than this
#   max_segment_sec: 18.0         # Force-cut monologues without pauses
#   overlap_ms: 200               # Audio prepended across cuts so words aren't clipped
#   drain_timeout_sec: 3.0         # Max wait for in-flight segments at key release
#   rolling_prompt_chars: 120     # Committed-text tail fed to next segment for context (0 disables)
